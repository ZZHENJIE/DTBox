name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release
        run: cd backend && cargo build --release --locked --bin dtbox-server

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install cross compile toolchain
        run: |
          rustup target add x86_64-pc-windows-msvc
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build for Windows
        run: cd backend && cargo build --release --locked --target x86_64-pc-windows-msvc --bin dtbox-server

      - name: Build for macOS Intel
        run: cd backend && cargo build --release --locked --target x86_64-apple-darwin --bin dtbox-server

      - name: Build for macOS Apple Silicon
        run: cd backend && cargo build --release --locked --target aarch64-apple-darwin --bin dtbox-server

      - name: Prepare release files
        run: |
          mkdir -p release/linux-x86_64
          cp backend/target/release/dtbox-server release/linux-x86_64/
          cp -r frontend/dist release/linux-x86_64/web
          cp backend/config.example.toml release/linux-x86_64/config.toml
          cd release/linux-x86_64 && zip -r ../../dtbox-linux-x86_64.zip . && cd ../..

          mkdir -p release/windows-x86_64
          cp backend/target/x86_64-pc-windows-msvc/release/dtbox-server.exe release/windows-x86_64/
          cp -r frontend/dist release/windows-x86_64/web
          cp backend/config.example.toml release/windows-x86_64/config.toml
          cd release/windows-x86_64 && zip -r ../../dtbox-windows-x86_64.zip . && cd ../..

          mkdir -p release/macos-x86_64
          cp backend/target/x86_64-apple-darwin/release/dtbox-server release/macos-x86_64/
          cp -r frontend/dist release/macos-x86_64/web
          cp backend/config.example.toml release/macos-x86_64/config.toml
          cd release/macos-x86_64 && zip -r ../../dtbox-macos-x86_64.zip . && cd ../..

          mkdir -p release/macos-arm64
          cp backend/target/aarch64-apple-darwin/release/dtbox-server release/macos-arm64/
          cp -r frontend/dist release/macos-arm64/web
          cp backend/config.example.toml release/macos-arm64/config.toml
          cd release/macos-arm64 && zip -r ../../dtbox-macos-arm64.zip . && cd ../..

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtbox-linux-x86_64
          path: dtbox-linux-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtbox-windows-x86_64
          path: dtbox-windows-x86_64.zip

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtbox-macos-x86_64
          path: dtbox-macos-x86_64.zip

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtbox-macos-arm64
          path: dtbox-macos-arm64.zip

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/DTBox-linux-x86_64.zip
            artifacts/DTBox-windows-x86_64.zip
            artifacts/DTBox-macos-x86_64.zip
            artifacts/DTBox-macos-arm64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: startsWith(github.ref, 'refs/tags/')
