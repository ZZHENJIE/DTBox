name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: dtbox-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: dtbox-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: dtbox-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: dtbox-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cd backend && cargo build --release --locked --bin dtbox-server
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci
        shell: bash

      - name: Build frontend
        run: cd frontend && npm run build
        shell: bash

      - name: Prepare release files (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release
          if test -f "backend/target/release/dtbox-server"; then cp backend/target/release/dtbox-server release/; else cp backend/target/release/dtbox-server.exe release/; fi
          cp -r frontend/dist release/web
          cp backend/config.example.toml release/config.toml
          cd release && zip -r ../${{ matrix.artifact-name }}.zip . && cd ..
        shell: bash

      - name: Prepare release files (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release
          cp backend/target/release/dtbox-server.exe release/
          cp -r frontend/dist release/web
          cp backend/config.example.toml release/config.toml
          cd release; Compress-Archive -Path * -DestinationPath ../${{ matrix.artifact-name }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.zip

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/dtbox-linux-x86_64.zip
            artifacts/dtbox-windows-x86_64.zip
            artifacts/dtbox-macos-x86_64.zip
            artifacts/dtbox-macos-arm64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: startsWith(github.ref, 'refs/tags/')
