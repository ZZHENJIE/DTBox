name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked

      - name: Find binary
        id: find_binary
        run: |
          cd target/release
          echo "=== Files in target/release ==="
          ls -la
          BINARY=$(ls -1 dtbox DTBox DTBox.exe 2>/dev/null | head -1)
          echo "binary=$BINARY" >> $GITHUB_OUTPUT

      - name: Rename binary
        run: |
          cd target/release
          SRC=${{ steps.find_binary.outputs.binary }}
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            DST=DTBox.exe
          else
            DST=DTBox
          fi
          if [ "$SRC" != "$DST" ]; then
            cp "$SRC" "$DST"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DTBox-${{ matrix.os }}-${{ matrix.target }}
          path: |
            target/release/DTBox
            target/release/DTBox.exe

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/DTBox
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
